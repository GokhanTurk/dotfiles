[window]
dimensions = { columns = 120, lines = 33 }
# Ekran kenarlarında rahat bir boşluk bırakır
padding = { x = 12, y = 12 }
dynamic_padding = true
# Şeffaflık ve bulanıklık ayarları
opacity = 0.85 
blur = true 
# İşletim sisteminin başlık çubuğunu ve pencere kenarlıklarını tamamen gizler
decorations = "None" 

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "FiraCode Nerd Font Mono", style = "Regular" }
bold = { family = "FiraCode Nerd Font Mono", style = "Bold" }
italic = { family = "FiraCode Nerd Font Mono", style = "Italic" }
# size = use ~/.config/alacritty/local.toml for this

# --- CATPPUCCIN MOCHA RENK PALETİ ---

[colors.primary]
background = "#1e1e2e" # Mocha'nın kendine has o hafif mor/koyu gri arkaplanı
foreground = "#cdd6f4" # Rahat okunan pastel beyaz/gri önplan

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"     # İmleç rengi için Rosewater (Uçuk Pembe/Mor) tonu

[colors.selection]
text = "#cdd6f4"
background = "#585b70" # Seçili metin arkaplanı

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"    # Sağdaki terminalde gördüğün o güzel pastel morlar buradan beslenir
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[general]
# ~/.config/alacritty/alacritty.toml

import = ["~/.config/alacritty/local.toml"]
